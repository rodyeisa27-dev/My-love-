<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هدية لروحي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #111122; --accent-pink: #ff4d6d; --glass: rgba(255, 255, 255, 0.08); --card-glow: rgba(255, 77, 109, 0.5); }
        body { margin: 0; font-family: 'Cairo', sans-serif; background-color: var(--bg-color); color: white; text-align: center; overflow-x: hidden; min-height: 100vh; }
        .hearts-bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        #loader { position: fixed; inset: 0; background: var(--bg-color); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        #login-screen { display: none; padding: 50px 20px; animation: fadeIn 1s; }
        input[type="password"] { padding: 15px; border-radius: 15px; border: 1px solid var(--accent-pink); background: var(--glass); color: white; width: 80%; max-width: 250px; margin: 20px 0; outline: none; text-align: center; font-size: 1.1rem; }
        .timer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px auto; max-width: 450px; padding: 10px; }
        .timer-box { background: var(--glass); padding: 15px 5px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .timer-box span { font-size: 1.5rem; font-weight: bold; color: var(--accent-pink); }
        .cards-section { padding: 20px; max-width: 550px; margin: 0 auto; }
        .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .love-card-wrapper { perspective: 1000px; height: 180px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.8s; transform-style: preserve-3d; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        .card-front { background: rgba(255,255,255,0.05); }
        .card-back { background: linear-gradient(145deg, var(--accent-pink), #c9184a); color: white; transform: rotateY(180deg); }
        .wide-btn { background: var(--glass); padding: 15px; border-radius: 20px; margin: 30px auto; width: 85%; max-width: 450px; border: 1px solid var(--accent-pink); cursor: pointer; }
        #main-content { display: none; padding-bottom: 50px; }
        #message-popup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 400px; background: #1a1a2e; border: 2px solid var(--accent-pink); padding: 30px; border-radius: 30px; z-index: 2000; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1999; }
        button { background: var(--accent-pink); color: white; border: none; padding: 12px 35px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="hearts-bg" id="hearts-container"></div>

<audio id="bgMusic" loop preload="auto">
    <source src="https://files.catbox.moe/8z8w0w.mp3" type="audio/mpeg">
</audio>

<div id="loader">
    <div style="font-size: 4rem; animation: pulse 1.5s infinite;">❤️</div>
    <h2>ثواني يا روحي... ❤️</h2>
</div>

<div id="login-screen">
    <h1>جاهز؟ 🤔</h1>
    <input type="password" id="passInput" placeholder="كلمة السر (love)">
    <br>
    <button onclick="checkPass()">افتح بسرعة ❤️😂</button>
</div>

<div id="main-content">
    <h3>يوم ما عرفنا بعض كان أحلى يوم ❤️</h3>
    <div class="wide-btn">2025-04-21</div>
    <div class="timer-grid">
        <div class="timer-box"><span id="years">0</span><br>سنة</div>
        <div class="timer-box"><span id="months">0</span><br>شهر</div>
        <div class="timer-box"><span id="days">0</span><br>يوم</div>
        <div class="timer-box"><span id="seconds" style="font-size: 1rem;">0</span><br>ثواني</div>
    </div>
    <div class="cards-section">
        <div class="cards-grid">
            <div class="love-card-wrapper" onclick="this.querySelector('.card-inner').classList.toggle('is-flipped')">
                <div class="card-inner">
                    <div class="card-front">❤️</div>
                    <div class="card-back">محبتش غيرك 😍</div>
                </div>
            </div>
            <div class="love-card-wrapper" onclick="this.querySelector('.card-inner').classList.toggle('is-flipped')">
                <div class="card-inner">
                    <div class="card-front">❤️</div>
                    <div class="card-back">أنت الحب كله ✨</div>
                </div>
            </div>
        </div>
    </div>
    <div class="wide-btn" onclick="showFinalMessage()">📩 دوس هنا 🔒</div>
</div>

<div class="overlay" id="overlay"></div>
<div id="message-popup">
    <h2>يا روح قلبي ❤️</h2>
    <p>ربنا يخليك ليا ومايحرمنيش منك أبداً يا حبيبي! ✨</p>
    <button onclick="closePopup()">إغلاق ❤️</button>
</div>

<script>
    setTimeout(() => { document.getElementById('loader').style.display = 'none'; document.getElementById('login-screen').style.display = 'block'; }, 2000);

    function checkPass() {
        const pass = document.getElementById('passInput').value.toLowerCase();
        const audio = document.getElementById('bgMusic');
        
        if(pass === 'love') {
            // محاولة التشغيل بأكثر من طريقة لضمان الصوت
            audio.muted = false;
            var playPromise = audio.play();
            
            if (playPromise !== undefined) {
                playPromise.then(_ => { console.log("اشتغلت!"); })
                .catch(error => {
                    // لو فشل، هيشتغل مع أول لمسة للمحتوى
                    console.log("المتصفح منع الصوت، سيعمل عند التفاعل");
                });
            }

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            startTimer();
        } else { alert('الباسورد غلط ركز 😂❤️'); }
    }

    function startTimer() {
        const start = new Date("2025-04-21T00:00:00");
        setInterval(() => {
            const now = new Date();
            const diff = now - start;
            document.getElementById('years').innerText = Math.floor(diff / (1000*60*60*24*365));
            document.getElementById('months').innerText = Math.floor((diff % (1000*60*60*24*365)) / (1000*60*60*24*30));
            document.getElementById('days').innerText = Math.floor((diff % (1000*60*60*24*30)) / (1000*60*60*24));
            document.getElementById('seconds').innerText = Math.floor((diff % (1000*60)) / 1000);
        }, 1000);
    }

    function showFinalMessage() { document.getElementById('overlay').style.display = 'block'; document.getElementById('message-popup').style.display = 'block'; }
    function closePopup() { document.getElementById('overlay').style.display = 'none'; document.getElementById('message-popup').style.display = 'none'; }

    function createHeart() {
        const h = document.createElement('div');
        h.innerHTML = '❤️'; h.style.position = 'fixed'; h.style.left = Math.random() * 100 + 'vw';
        h.style.top = '110vh'; h.style.transition = 'transform 6s linear'; h.style.zIndex = "-1";
        document.body.appendChild(h);
        setTimeout(() => { h.style.transform = `translateY(-120vh)`; }, 100);
        setTimeout(() => h.remove(), 6000);
    }
    setInterval(createHeart, 400);
</script>
</body>
                </html>
