<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>هدية لروحي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-color: #111122; --accent-pink: #ff4d6d; --glass: rgba(255, 255, 255, 0.08); }
        body { margin: 0; font-family: 'Cairo', sans-serif; background-color: var(--bg-color); color: white; text-align: center; overflow-x: hidden; min-height: 100vh; }
        .hearts-bg { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        #loader { position: fixed; inset: 0; background: var(--bg-color); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        #login-screen { display: none; padding: 50px 20px; }
        input { padding: 15px; border-radius: 15px; border: 1px solid var(--accent-pink); background: var(--glass); color: white; width: 80%; max-width: 250px; margin: 20px 0; text-align: center; }
        .timer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px auto; max-width: 450px; }
        .timer-box { background: var(--glass); padding: 15px 5px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .timer-box span { font-size: 1.5rem; font-weight: bold; color: var(--accent-pink); }
        .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .card { background: var(--glass); padding: 20px; border-radius: 20px; border: 1px solid var(--accent-pink); cursor: pointer; }
        #main-content { display: none; padding-bottom: 50px; }
        button { background: var(--accent-pink); color: white; border: none; padding: 12px 35px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="hearts-bg" id="hearts-container"></div>

<audio id="bgMusic" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div id="loader">
    <div style="font-size: 4rem;">❤️</div>
    <h2 id="loading-text">ثواني يا روحي معلش ❤️</h2>
</div>

<div id="login-screen">
    <h1>جاهز؟ 🤔</h1>
    <input type="password" id="passInput" placeholder="اكتب كلمة السر (love)">
    <br>
    <button onclick="checkPass()">يلا بسرعة افتح ❤️😂</button>
</div>

<div id="main-content">
    <h3>بداية عمري معاك ❤️</h3>
    <div class="timer-grid">
        <div class="timer-box"><span id="days">0</span><br>يوم</div>
        <div class="timer-box"><span id="hours">0</span><br>ساعة</div>
        <div class="timer-box"><span id="mins">0</span><br>دقيقة</div>
    </div>

    <div class="cards-grid">
        <div class="card" onclick="alert('محبتش غيرك 😍')">كارت 1 ❤️</div>
        <div class="card" onclick="alert('أنت الحب كله ✨')">كارت 2 ❤️</div>
    </div>
</div>

<script>
    // حل مشكلة التعليق: هنخلي اللودر يختفي حتى لو الأغنية محملتش
    window.onload = function() {
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('login-screen').style.display = 'block';
        }, 1500); 
    };

    function checkPass() {
        const pass = document.getElementById('passInput').value.toLowerCase();
        const audio = document.getElementById('bgMusic');

        if(pass === 'love') {
            // تشغيل الأغنية فوراً
            audio.play().catch(e => console.log("الصوت محتاج تفاعل"));
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            
            // تشغيل العداد
            const start = new Date("2025-04-21T00:00:00");
            setInterval(() => {
                const now = new Date();
                const diff = now - start;
                document.getElementById('days').innerText = Math.floor(diff / (1000*60*60*24));
                document.getElementById('hours').innerText = Math.floor((diff / (1000*60*60)) % 24);
                document.getElementById('mins').innerText = Math.floor((diff / (1000*60)) % 60);
            }, 1000);
        } else {
            alert('الباسورد غلط يا روحي 😂');
        }
    }
</script>
</body>
</html>
